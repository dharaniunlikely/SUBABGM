<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SUBA BGM</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo-box">
        <img src="IMG-20260710-WA0018 (1).jpg" alt="SUBA BGM Logo">
        <h1>SUBA BGM</h1>
    </div>

    <div class="brand">
        <span>SUBA</span> EFX
    </div>

</header>


<section class="hero">

    <div class="hero-content">

        <h2>Feel The Music</h2>

        <p>
            Free Music & Ringtone Download
        </p>

        <button id="exploreBtn">
            Explore Music
        </button>

    </div>

</section>


<section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="Search music or ringtone..."
    >

</section>


<section class="category-section">

    <button data-filter="all">All</button>
    <button data-filter="music">Music</button>
    <button data-filter="ringtone">Ringtone</button>

</section>


<section class="music-section" id="musicSection">

    <h2>Latest Updates</h2>

    <div class="music-grid" id="musicList"></div>

</section>


<footer>

    <h3>SUBA BGM</h3>

    <p>© 2026 SUBA BGM</p>

</footer>


<script src="script.js"></script>

</body>

</html>
