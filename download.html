<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Download | SUBA EFX</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

    <div class="logo-box">

        <img src="assets/logo.png" alt="SUBA BGM">

        <h1>SUBA BGM</h1>

    </div>

    <div class="brand">

        <span>SUBA</span> EFX

    </div>

</header>


<section class="hero">

    <div class="hero-content">

        <h2>Download</h2>

        <p>
            Free Music & Ringtone Download
        </p>

    </div>

</section>


<section class="music-section">

    <div class="music-card empty-box">

        <h2 id="downloadTitle">
            Download File
        </h2>

        <p id="downloadMessage">
            Please wait 10 seconds...
        </p>

        <h1 id="downloadTimer">
            10
        </h1>

        <button
            class="download-btn"
            id="downloadButton"
            disabled>

            Preparing Download...

        </button>

    </div>

</section>


<footer>

    <h3>SUBA BGM</h3>

    <p>© 2026 SUBA EFX</p>

</footer>


<script src="download.js"></script>

</body>
